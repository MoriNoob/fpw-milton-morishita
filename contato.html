<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <!-- Link para o arquivo css, Ăºnico para todas os html -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
    <header>
        <h1>PortfĂ³lio do Milton Morishita</h1>
    </header>

    <!-- Menu que aparece em todas as pĂ¡ginas. A classe "ativo" serve para sublinhar e deixar em negrito o tĂ­tulo da pĂ¡gina no menu que estĂ¡ aberta. Neste caso, a pĂ¡gina aberta Ă© a de "Contato" -->
    <nav>
        <ul>
            <li><a href="index.html">InĂ­cio</a></li>
            <li><a href="sobre.html">Sobre mim</a></li>
            <li><a href="formacao.html">FormaĂ§Ă£o</a></li>
            <li><a href="portfolio.html">PortfĂ³lio</a></li>
            <li><a href="contato.html" class="ativo">Contato</a></li>
        </ul>
    </nav>

    <main>
        <div class="form-box">
            <h2>Envie sua mensagem</h2>
        <form id="formContato">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome">
            </div>
        
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="text" id="email">
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem"></textarea>
            </div>

            <button type="submit">Enviar</button>

            <div class="mensagem-sucesso" id="sucesso">
                Mensagem enviada com sucesso!
            </div>
        </form>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por Milton Morishita - 2026</p>
    </footer>    

<script>
    const form = document.getElementById("formContato");
    const sucesso = document.getElementById("sucesso");
    const campos = document.querySelectorAll("#formContato input, #formContato textarea");

    // Esconder a mensagem de "Sucesso" quando outro formulĂ¡rio comeĂ§ar a ser preenchido
    campos.forEach(campo => {
        campo.addEventListener("input", () => {
            sucesso.style.display = "none";
        });
    });

    // Envio do formulĂ¡rio
    form.addEventListener("submit", function(event) {
        event.preventDefault();

        // Esconde a mensagem antes de validar novamente
        sucesso.style.display = "none";

        const nome = document.getElementById("nome").value.trim();
        const email = document.getElementById("email").value.trim();
        const mensagem = document.getElementById("mensagem").value.trim();

        // Regex para validaĂ§Ă£o do e-mail
        const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // ValidaĂ§Ă£o do e-mail
        if (nome === "" || email === "" || mensagem === "") {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        // Alerta para inserĂ§Ă£o de e-mail em formato vĂ¡lido
        if (!emailValido.test(email)) {
            alert("Por favor, insira um e-mail vĂ¡lido.");
            return;
        }

        // SimulaĂ§Ă£o de envio
        form.reset();

        // AprsentaĂ§Ă£o de mensagem visual
        sucesso.style.display = "block";

        // Alerta para mensagem enviada com sucesso
        alert("Mensagem enviada com sucesso!");
        });
</script>
</body>
</html>
